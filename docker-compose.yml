# =============================================================================
# DGX Spark AI Stack — Docker Compose v2
# Target: NVIDIA DGX Spark (GB10, 128 GB UMA, ARM64, CUDA 13.0)
# =============================================================================
# Usage:
#   cp .env.example .env   # edit values
#   docker compose up -d redis supervisor gateway whisper frontend  # always-on tier
#   docker compose up -d f5tts liveportrait lipsync                 # warm tier
#   # wan21 is started on-demand by the supervisor sidecar
# =============================================================================

name: dgx-ai-stack

x-common-gpu: &common-gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu, compute, utility]

x-common-env: &common-env
  NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
  HF_HOME: /cache/hf
  TRANSFORMERS_CACHE: /cache/hf
  TORCH_HOME: /models/torch
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-common-volumes: &common-volumes
  - ${MODELS_DIR:-/srv/ai/models}:/models:rw
  - ${HF_CACHE_DIR:-/srv/ai/cache/hf}:/cache/hf:rw
  - ${OUTPUTS_DIR:-/srv/ai/outputs}:/outputs:rw
  - ${ASSETS_DIR:-/srv/ai/assets}:/app/data/assets:rw
  - ${LOGS_DIR:-/srv/ai/logs}:/logs:rw

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

services:
  # ===========================================================================
  # ALWAYS-ON TIER
  # ===========================================================================

  redis:
    image: redis:7.4-alpine
    container_name: ai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
      start_period: 5s
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 100
    networks:
      - ai-net

  # Supervisor sidecar — holds Docker socket, starts/stops lazy containers.
  # NOT exposed to external network. Only gateway calls it internally.
  supervisor:
    build:
      context: ./supervisor
      dockerfile: Dockerfile
    container_name: ai-supervisor
    restart: unless-stopped
    environment:
      <<: *common-env
      COMPOSE_DIR: /project
      WAN21_URL: http://wan21:8000
      F5TTS_URL: http://f5tts:8000
      FISH_SPEECH_URL: http://fish_speech:8000
      PREMIUM_CLONE_TTS_URL: http://premium_clone_tts:8000
      LIVEPORTRAIT_URL: http://liveportrait:8000
      LIPSYNC_URL: http://lipsync:8000
      WHISPER_URL: http://whisper:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - .:/project:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 10s
    networks:
      - ai-net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ai-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8000"
    environment:
      <<: *common-env
      REDIS_URL: redis://redis:6379/0
      SUPERVISOR_URL: http://supervisor:8000
      WHISPER_URL: http://whisper:8000
      F5TTS_URL: http://f5tts:8000
      FISH_SPEECH_URL: http://fish_speech:8000
      PREMIUM_CLONE_TTS_URL: http://premium_clone_tts:8000
      LIVEPORTRAIT_URL: http://liveportrait:8000
      LIPSYNC_URL: http://lipsync:8000
      WAN21_URL: http://wan21:8000
      FISH_SPEECH_ENABLED: ${FISH_SPEECH_ENABLED:-false}
      PREMIUM_CLONE_TTS_ENABLED: ${PREMIUM_CLONE_TTS_ENABLED:-false}
      FISH_SPEECH_DISPLAY_NAME: ${FISH_SPEECH_DISPLAY_NAME:-Fish Speech}
      PREMIUM_CLONE_TTS_DISPLAY_NAME: ${PREMIUM_CLONE_TTS_DISPLAY_NAME:-Premium Clone TTS}
      FISH_SPEECH_OUTPUT_FORMATS: ${FISH_SPEECH_OUTPUT_FORMATS:-wav,mp3,opus}
      FISH_SPEECH_TARGET_SAMPLE_RATES: ${FISH_SPEECH_TARGET_SAMPLE_RATES:-}
      PREMIUM_CLONE_TTS_OUTPUT_FORMATS: ${PREMIUM_CLONE_TTS_OUTPUT_FORMATS:-wav}
      PREMIUM_CLONE_TTS_TARGET_SAMPLE_RATES: ${PREMIUM_CLONE_TTS_TARGET_SAMPLE_RATES:-}
      PREMIUM_CLONE_TTS_SUPPORTS_48KHZ_OUTPUT: ${PREMIUM_CLONE_TTS_SUPPORTS_48KHZ_OUTPUT:-false}
      COMFYUI_URL: http://comfyui:8188
      COMFYUI_MODEL_ROOTS: ${COMFYUI_MODEL_ROOTS:-/models/comfyui,/opt/ComfyUI/custom_nodes/comfyui_controlnet_aux/ckpts}
      MEMORY_WARN_THRESHOLD: ${MEMORY_WARN_THRESHOLD:-70}
      MEMORY_HARD_LIMIT: ${MEMORY_HARD_LIMIT:-80}
      MEM_RESERVE_HEAVY_GB: ${MEM_RESERVE_HEAVY_GB:-40}
      MEM_RESERVE_MEDIUM_GB: ${MEM_RESERVE_MEDIUM_GB:-10}
      MEM_RESERVE_LIGHT_GB: ${MEM_RESERVE_LIGHT_GB:-2}
    volumes:
      - ${MODELS_DIR:-/srv/ai/models}:/models:ro
      - ${OUTPUTS_DIR:-/srv/ai/outputs}:/outputs:rw
      - ${ASSETS_DIR:-/srv/ai/assets}:/app/data/assets:rw
      - ${LOGS_DIR:-/srv/ai/logs}:/logs:rw
      # NOTE: No docker.sock — orchestration delegated to supervisor
    depends_on:
      redis:
        condition: service_healthy
      supervisor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 10s
    networks:
      - ai-net

  # Director's Console — NeonForge web UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      GATEWAY_INTERNAL_URL: http://gateway:8000
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      <<: *healthcheck-defaults
      start_period: 30s
    networks:
      - ai-net

  whisper:
    build:
      context: ./services/whisper
      dockerfile: Dockerfile
    container_name: ai-whisper
    restart: unless-stopped
    <<: *common-gpu
    environment:
      <<: *common-env
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-medium}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-float16}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-5}
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 120s
    networks:
      - ai-net

  # ===========================================================================
  # WARM TIER — containers run, models load on first request, destroyed on idle
  # ===========================================================================

  f5tts:
    build:
      context: ./services/f5tts
      dockerfile: Dockerfile
    container_name: ai-f5tts
    restart: unless-stopped
    <<: *common-gpu
    environment:
      <<: *common-env
      F5TTS_IDLE_TIMEOUT: ${F5TTS_IDLE_TIMEOUT:-1800}
      F5TTS_SAMPLE_RATE: ${F5TTS_SAMPLE_RATE:-24000}
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 120s
    networks:
      - ai-net

  fish_speech:
    build:
      context: ./services/fish_speech
      dockerfile: Dockerfile
    container_name: ai-fish-speech
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OUTPUTS_ROOT: /outputs
      OUTPUT_DIR: /outputs/tts/fish_speech
      FISH_SPEECH_RUNTIME_URL: ${FISH_SPEECH_RUNTIME_URL:-}
      FISH_SPEECH_RUNTIME_HEALTH_PATH: ${FISH_SPEECH_RUNTIME_HEALTH_PATH:-/v1/health}
      FISH_SPEECH_RUNTIME_TTS_PATH: ${FISH_SPEECH_RUNTIME_TTS_PATH:-/v1/tts}
      FISH_SPEECH_TIMEOUT_SEC: ${FISH_SPEECH_TIMEOUT_SEC:-300}
    volumes: *common-volumes
    profiles:
      - fish_speech
      - full
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 10s
    networks:
      - ai-net

  premium_clone_tts:
    build:
      context: ./services/premium_clone_tts
      dockerfile: Dockerfile
    container_name: ai-premium-clone-tts
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OUTPUTS_ROOT: /outputs
      OUTPUT_DIR: /outputs/tts/premium_clone_tts
      PREMIUM_CLONE_TTS_UPSTREAM_URL: ${PREMIUM_CLONE_TTS_UPSTREAM_URL:-}
      PREMIUM_CLONE_TTS_HEALTH_PATH: ${PREMIUM_CLONE_TTS_HEALTH_PATH:-/healthz}
      PREMIUM_CLONE_TTS_SYNTH_PATH: ${PREMIUM_CLONE_TTS_SYNTH_PATH:-/synthesize}
      PREMIUM_CLONE_TTS_TIMEOUT_SEC: ${PREMIUM_CLONE_TTS_TIMEOUT_SEC:-300}
    volumes: *common-volumes
    profiles:
      - premium_clone_tts
      - full
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 10s
    networks:
      - ai-net

  comfyui:
    build:
      context: .
      dockerfile: comfyUI/Dockerfile
    container_name: ai-comfyui
    restart: unless-stopped
    <<: *common-gpu
    environment:
      <<: *common-env
      COMFYUI_PORT: ${COMFYUI_PORT:-8188}
    volumes: *common-volumes 
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    command: >
      python main.py
      --listen 0.0.0.0
      --port 8188
      --input-directory /outputs/comfyui/input
      --output-directory /outputs/comfyui/output
      --user-directory /outputs/comfyui/user
      --enable-manager
    profiles:
      - comfyui
      - full
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8188/')"]
      <<: *healthcheck-defaults
      start_period: 120s
    networks:
      - ai-net

  liveportrait:
    build:
      context: ./services/liveportrait
      dockerfile: Dockerfile
    container_name: ai-liveportrait
    restart: unless-stopped
    <<: *common-gpu
    environment:
      <<: *common-env
      LIVEPORTRAIT_IDLE_TIMEOUT: ${LIVEPORTRAIT_IDLE_TIMEOUT:-1800}
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 120s
    networks:
      - ai-net

  wan-ui:
    build:
      context: ./Wan2.2-Animate
      dockerfile: Dockerfile
      additional_contexts:
        comfyui_resolver: ./comfyUI
    container_name: ai-wan-ui
    restart: unless-stopped
    <<: *common-gpu
    volumes:
      - /srv/ai/models/comfyui:/models/comfyui:ro
      - ${HF_CACHE_DIR:-/srv/ai/cache/hf}:/cache/hf:rw
    environment:
      HF_HOME: /cache/hf
      GRADIO_SERVER_NAME: "0.0.0.0"
    ports:
      - "7860:7860"
    networks:
      - ai-net

  lipsync:
    build:
      context: ./services/lipsync
      dockerfile: Dockerfile
    container_name: ai-lipsync
    restart: unless-stopped
    <<: *common-gpu
    environment:
      <<: *common-env
      LIPSYNC_IDLE_TIMEOUT: ${LIPSYNC_IDLE_TIMEOUT:-1800}
      LIPSYNC_BACKEND: ${LIPSYNC_BACKEND:-video-retalking}
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 120s
    networks:
      - ai-net

  # ===========================================================================
  # LAZY-START TIER — started on demand by supervisor, stopped after idle
  # ===========================================================================

  wan21:
    build:
      context: ./services/wan21
      dockerfile: Dockerfile
    container_name: ai-wan21
    # No restart — managed by supervisor + idle_manager
    restart: "no"
    <<: *common-gpu
    environment:
      <<: *common-env
      WAN21_MODEL_VARIANT: ${WAN21_MODEL_VARIANT:-1.3B}
      WAN21_MAX_CONCURRENT: ${WAN21_MAX_CONCURRENT:-1}
      WAN21_IDLE_TIMEOUT: ${WAN21_IDLE_TIMEOUT:-300}
      WAN21_MAX_VIDEO_LENGTH: ${WAN21_MAX_VIDEO_LENGTH:-10}
      WAN21_MAX_RESOLUTION: ${WAN21_MAX_RESOLUTION:-512}
    volumes: *common-volumes
    profiles:
      - wan21
      - full
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      <<: *healthcheck-defaults
      start_period: 180s
    networks:
      - ai-net

volumes:
  redis-data:
    driver: local

networks:
  ai-net:
    driver: bridge
    name: ai-net
